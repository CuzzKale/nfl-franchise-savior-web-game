<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Franchise Savior</title>
</head>
<body>
<form action="/coach" method="post">

    <h1>Coach Info</h1>
    <p>You Are Required To Fill Out This Information</p>
    <label for="coach-name">Coach Name:</label>
    <input type="text" id="coach-name" name="coach-name-text" value="coach"
    minlength="3" maxlength="25" required>

    <label for="coach-age">Coach Age:</label>
    <input type="number" id="coach-age" name="coach-age-number"
    min="18" max="80" required>

    <h1>Pick A Team</h1>
    <h3>AFC</h3>

    <p>AFC East</p>
    <input type="radio" id="Buffalo" name="pick" value="1">
    <label for="Buffalo">Buffalo</label>
    <input type="radio" id="Miami" name="pick" value="2">
    <label for="Miami">Miami</label>
    <input type="radio" id="New England" name="pick" value="3">
    <label for="New England">New England</label>
    <input type="radio" id="New York J" name="pick" value="4">
    <label for="New York J">New York J</label>

    <p>AFC North</p>
    <input type="radio" id="Baltimore" name="pick" value="5">
    <label for="Baltimore">Baltimore</label>
    <input type="radio" id="Cincinnati" name="pick" value="6">
    <label for="Cincinnati">Cincinnati</label>
    <input type="radio" id="Cleveland" name="pick" value="7">
    <label for="Cleveland">Cleveland</label>
    <input type="radio" id="Pittsburgh" name="pick" value="8">
    <label for="Pittsburgh">Pittsburgh</label>

    <p>AFC South</p>
    <input type="radio" id="Houston" name="pick" value="9">
    <label for="Houston">Houston</label>
    <input type="radio" id="Jacksonville" name="pick" value="10">
    <label for="Jacksonville">Jacksonville</label>
    <input type="radio" id="Indianapolis" name="pick" value="11">
    <label for="Indianapolis">Indianapolis</label>
    <input type="radio" id="Tennessee" name="pick" value="12">
    <label for="Tennessee">Tennessee</label>

    <p>AFC West</p>
    <input type="radio" id="Denver" name="pick" value="13">
    <label for="Denver">Denver</label>
    <input type="radio" id="Kansas City" name="pick" value="14">
    <label for="Kansas City">Kansas City</label>
    <input type="radio" id="Las Vegas" name="pick" value="15">
    <label for="Las Vegas">Las Vegas</label>
    <input type="radio" id="Los Angeles" name="pick" value="16">
    <label for="Los Angeles">Los Angeles</label>

    <h3>NFC</h3>

    <p>NFC East</p>
    <input type="radio" id="Dallas" name="pick" value="17">
    <label for="Dallas">Dallas</label>
    <input type="radio" id="New York G" name="pick" value="18">
    <label for="New York G">New York G</label>
    <input type="radio" id="Philadelphia" name="pick" value="19">
    <label for="Philadelphia">Philadelphia</label>
    <input type="radio" id="Washington" name="pick" value="20">
    <label for="Washington">Washington</label>

    <p>NFC North</p>
    <input type="radio" id="Chicago" name="pick" value="21">
    <label for="Chicago">Chicago</label>
    <input type="radio" id="Detroit" name="pick" value="22">
    <label for="Detroit">Detroit</label>
    <input type="radio" id="Green Bay" name="pick" value="23">
    <label for="Green Bay">Green Bay</label>
    <input type="radio" id="Minnesota" name="pick" value="24">
    <label for="Minnesota">Minnesota</label>

    <p>NFC South</p>
    <input type="radio" id="Atlanta" name="pick" value="25">
    <label for="Atlanta">Atlanta</label>
    <input type="radio" id="Carolina" name="pick" value="26">
    <label for="Carolina">Carolina</label>
    <input type="radio" id="New Orleans" name="pick" value="27">
    <label for="New Orleans">New Orleans</label>
    <input type="radio" id="Tampa Bay" name="pick" value="28">
    <label for="Tampa Bay">Tampa Bay</label>

    <p>NFC West</p>
    <input type="radio" id="Arizona" name="pick" value="29">
    <label for="Arizona">Arizona</label>
    <input type="radio" id="Los Angeles R" name="pick" value="30">
    <label for="Los Angeles R">Los Angeles R</label>
    <input type="radio" id="San Francisco" name="pick" value="31">
    <label for="San Francisco">San Francisco</label>
    <input type="radio" id="Seattle" name="pick" value="32">
    <label for="Seattle">Seattle</label>

    <input type="submit" value="Continue">
</form>
<script src="javascript/fetch.js"></script>
</body>
</html>
